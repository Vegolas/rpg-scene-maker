name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (saves Actions minutes on active branches).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Building the API project also builds the referenced Blazor WASM UI.
      - name: Restore
        run: dotnet restore src/AmbientDirector.Api/AmbientDirector.Api.csproj

      - name: Build
        run: dotnet build src/AmbientDirector.Api/AmbientDirector.Api.csproj --configuration Release --no-restore

      # Run the automated test suite. The Linux runner never touches NAudio's Windows-only audio
      # output device, so every test here is cross-platform.
      - name: Restore tests
        run: dotnet restore src/AmbientDirector.Tests/AmbientDirector.Tests.csproj

      - name: Test
        run: dotnet test src/AmbientDirector.Tests/AmbientDirector.Tests.csproj --configuration Release --no-restore

  # Smoke-test the installable Windows publish (issue #98). release-win.yml only exercises the win-x64
  # single-file profile on v* tags, so without this a change that breaks publish (content-root or
  # boot-script fingerprinting, as nearly happened twice in #75) would only surface at release time.
  # Cross-publishing win-x64 works from Linux, so no Windows runner is needed. This mirrors
  # release-win.yml's publish + verify steps, minus the packaging/release tail. It runs on every PR
  # (rather than path-filtered) because a publish break can originate almost anywhere in the source;
  # the concurrency group above already cancels superseded runs to keep the minutes bounded.
  publish-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Publishing the API project also builds + trims the referenced Blazor WASM UI into wwwroot.
      # (publish restores the win-x64 runtime pack itself; no separate restore step needed.)
      - name: Publish (win-x64, single-file, self-contained)
        run: dotnet publish src/AmbientDirector.Api/AmbientDirector.Api.csproj -p:PublishProfile=win-x64 -o publish/win-x64

      # Assert the artifact set the release zip depends on actually built (the brief's Test-Path check).
      - name: Verify artifact
        run: |
          test -f publish/win-x64/AmbientDirector.Api.exe || { echo "::error::AmbientDirector.Api.exe missing"; exit 1; }
          test -f publish/win-x64/wwwroot/index.html    || { echo "::error::wwwroot/index.html missing"; exit 1; }
          test -f publish/win-x64/scenes.json           || { echo "::error::scenes.json missing"; exit 1; }
          echo "Artifact contents:"; ls -la publish/win-x64
