name: release-win

# Build the installable Windows artifact (issue #75) and publish it as a GitHub release.
# Triggers: pushing a v* tag (the real release), or a manual run (build + artifact, and a release too
# if you supply a tag). The everyday PR build lives in build.yml and is left untouched.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0). Leave blank to just build the zip artifact.'
        required: false
        default: ''

# The release step needs to create a release + upload assets.
permissions:
  contents: write

concurrency:
  group: release-win-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # A self-contained win-x64 single-file build cross-publishes fine from Linux (the win-x64 runtime pack
    # + native libs are restored from NuGet and bundled), so no Windows runner is needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Derive the version to stamp into the exe from the trigger: a v* tag push (or a manual run with a
      # `tag` input) becomes the release number with the leading "v" stripped (v0.1.0 → 0.1.0); a tagless
      # manual run gets a throwaway dev version so the build is still identifiable. Passed to publish below.
      - name: Compute version
        id: version
        run: |
          RAW="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          if [ -n "$RAW" ]; then
            VERSION="${RAW#v}"
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Stamping version: $VERSION"

      # Publishing the API project also builds + trims the referenced Blazor WASM UI into wwwroot.
      # -p:Version stamps the AssemblyInformationalVersion surfaced in-app (Settings, startup banner) and /diagnostics.
      - name: Publish (win-x64, single-file, self-contained)
        run: dotnet publish src/AmbientDirector.Api/AmbientDirector.Api.csproj -p:PublishProfile=win-x64 -p:Version=${{ steps.version.outputs.version }} -o publish/win-x64

      # Smoke-check the artifact actually built before packaging/releasing (the brief's Test-Path check).
      - name: Verify artifact
        run: |
          test -f publish/win-x64/AmbientDirector.Api.exe || { echo "::error::AmbientDirector.Api.exe missing"; exit 1; }
          test -f publish/win-x64/wwwroot/index.html    || { echo "::error::wwwroot/index.html missing"; exit 1; }
          test -f publish/win-x64/scenes.json           || { echo "::error::scenes.json missing"; exit 1; }
          echo "Artifact contents:"; ls -la publish/win-x64

      - name: Package zip
        run: |
          cd publish/win-x64
          zip -r ../../ambient-director-win-x64.zip .
          cd ../..
          ls -la ambient-director-win-x64.zip

      # Always keep the zip on the run so a manual (tagless) build is still downloadable.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ambient-director-win-x64
          path: ambient-director-win-x64.zip

      # Create the GitHub release on a v* tag push, or on a manual run that supplied a tag.
      - name: Create GitHub release
        if: github.ref_type == 'tag' || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: Ambient Director ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: ambient-director-win-x64.zip
          body: |
            Windows build of Ambient Director. Download **ambient-director-win-x64.zip**, unzip it anywhere,
            and double-click **AmbientDirector.Api.exe** — the panel opens in your browser and a guided first-run
            setup walks you through lights, music and the rest. No .NET install required.

            The exe is unsigned, so Windows may show "Windows protected your PC" the first time — click
            **More info → Run anyway**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
